name: "Deploy to Production"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deployment_type:
        description: "Type of deployment"
        required: true
        default: "rolling"
        type: choice
        options:
          - rolling
          - blue-green
          - canary
      skip_tests:
        description: "Skip test suite (emergency deployments only)"
        required: false
        default: false
        type: boolean
      rollback_version:
        description: "Version to rollback to (if applicable)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-production-validation:
    name: Pre-production Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    outputs:
      should-deploy: ${{ steps.validation.outputs.should-deploy }}
      version-tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for version detection

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate version tag
        id: version
        run: |
          VERSION="v$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Database connectivity check
        run: |
          echo "🔍 Starting production database connectivity check..."

          # Step 1: Validate Prisma schema first
          echo "Validating Prisma schema..."
          npx prisma validate

          # Step 2: Generate Prisma Client (needed for connection test)
          echo "Generating Prisma Client..."
          npx prisma generate

          # Step 3: Test actual database connection with timeout and retry
          echo "Testing database connection..."
          node -e "
            const { PrismaClient } = require('@prisma/client');
            
            async function testConnection(retries = 3) {
              const prisma = new PrismaClient({
                log: ['error', 'warn'],
                datasources: {
                  db: {
                    url: process.env.DATABASE_URL
                  }
                },
                // Connection pool options (ignored if not supported by driver, safe to include)
                connectionLimit: 5,
                pool: {
                  min: 2,
                  max: 10,
                  acquireTimeoutMillis: 30000,
                  idleTimeoutMillis: 30000,
                  connectionTimeoutMillis: 2000,
                }
              });
              
              for (let i = 0; i < retries; i++) {
                try {
                  // Set a timeout for the connection attempt
                  const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Connection timeout')), 10000)
                  );
                  
                  // Try to connect and run a simple query
                  const connectionPromise = (async () => {
                    await prisma.\$connect();
                    
                    // Run a simple query to verify read access
                    const result = await prisma.\$queryRaw\`SELECT current_database(), current_user, version()\`;
                    console.log('✅ Database connection successful');
                    console.log('📊 Database info:', result[0]);
                    
                    // Optional: Check if critical tables exist
                    const tables = await prisma.\$queryRaw\`
                      SELECT tablename 
                      FROM pg_tables 
                      WHERE schemaname = 'public' 
                      AND tablename IN ('profiles', 'catering_requests', 'addresses')
                      ORDER BY tablename
                    \`;
                    console.log('✅ Critical tables found:', tables.length, 'tables');

                    // Validate connection pool by issuing several parallel queries
                    console.log('🔄 Validating connection pool with parallel queries...');
                    await Promise.all(
                      Array.from({ length: 10 }, () => prisma.\$queryRaw\`SELECT 1\`)
                    );
                    console.log('✅ Connection pool handled parallel queries');
                    
                    return true;
                  })();
                  
                  await Promise.race([connectionPromise, timeoutPromise]);
                  await prisma.\$disconnect();
                  return;
                  
                } catch (error) {
                  console.error(\`❌ Connection attempt \${i + 1} failed:\`, error.message);
                  
                  if (i === retries - 1) {
                    console.error('🚨 All connection attempts failed');
                    await prisma.\$disconnect();
                    process.exit(1);
                  }
                  
                  console.log(\`⏳ Retrying in 5 seconds... (attempt \${i + 2}/\${retries})\`);
                  await new Promise(resolve => setTimeout(resolve, 5000));
                }
              }
            }
            
            testConnection().catch(error => {
              console.error('🚨 Unexpected error:', error);
              process.exit(1);
            });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check migration status
        run: |
          echo "📋 Checking migration status..."
          npx prisma migrate status --schema=./prisma/schema.prisma
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify health endpoint
        run: |
          # If your app has a health endpoint that checks DB
          curl -sf https://readysetllc.com/api/health || echo "Health check endpoint not available yet"
        continue-on-error: true

      - name: Security scan
        run: |
          echo "Running security scan..."
          pnpm audit --audit-level moderate
          echo "Security scan completed"

      - name: Run full test suite
        if: ${{ !inputs.skip_tests }}
        run: |
          echo "Running comprehensive test suite..."
          pnpm test
          echo "All tests passed ✅"
        env:
          CI: true

      - name: Load testing preparation
        run: |
          echo "Preparing load testing configuration..."
          # Add load testing setup here
          echo "Load testing configuration ready"

      - name: Validation summary
        id: validation
        run: |
          echo "should-deploy=true" >> $GITHUB_OUTPUT
          echo "✅ All pre-production validations passed"

  production-approval:
    name: Production Deployment Approval
    runs-on: ubuntu-latest
    needs: pre-production-validation
    if: needs.pre-production-validation.outputs.should-deploy == 'true'

    steps:
      - name: Request manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ealanis,team-lead # Add your team leads here
          minimum-approvals: 1
          issue-title: "Production Deployment Approval Required"
          issue-body: |
            ## 🚀 Production Deployment Request

            **Version:** ${{ needs.pre-production-validation.outputs.version-tag }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Deployment Type:** ${{ inputs.deployment_type || 'rolling' }}

            ### Pre-deployment Checklist
            - ✅ All tests passed
            - ✅ Security scan completed
            - ✅ Database connectivity verified
            - ✅ Load testing configuration ready

            ### Approval Required
            Please review the changes and approve this deployment to production.

            **Warning:** This will deploy to the production environment.
          exclude-workflow-initiator-as-approver: false

  build-production-image:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [pre-production-validation, production-approval]
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ needs.pre-production-validation.outputs.version-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=production-latest
            type=raw,value=${{ needs.pre-production-validation.outputs.version-tag }}
            type=sha,prefix=prod-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

      - name: Output image
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest" >> $GITHUB_OUTPUT

  database-backup-and-migration:
    name: Database Backup and Migration
    runs-on: ubuntu-latest
    needs: [build-production-image]
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Create production database backup
        run: |
          echo "Creating production database backup..."
          BACKUP_FILE="prod-backup-$(date +%Y%m%d-%H%M%S).sql"
          echo "Backup file: $BACKUP_FILE"

          # Add actual backup command here
          # pg_dump $DATABASE_URL > $BACKUP_FILE
          # aws s3 cp $BACKUP_FILE s3://your-backup-bucket/

          echo "✅ Database backup completed: $BACKUP_FILE"

      - name: Validate migration compatibility
        run: |
          echo "Validating migration compatibility..."
          npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma
          echo "✅ Migration validation completed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run production migrations
        run: |
          echo "Running production database migrations..."
          npx prisma migrate deploy
          echo "✅ Production migrations completed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-production-image, database-backup-and-migration]

    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Starting production deployment..."
          echo "Image: ${{ needs.build-production-image.outputs.image }}"
          echo "Version: ${{ needs.build-production-image.outputs.version }}"
          echo "Deployment Type: ${{ inputs.deployment_type || 'rolling' }}"

          # Add your production deployment logic here
          # This could be:
          # - Kubernetes deployment updates
          # - Docker Swarm service updates
          # - Cloud provider deployments (AWS ECS, Azure Container Instances, etc.)
          # - Server updates via SSH

          case "${{ inputs.deployment_type || 'rolling' }}" in
            "rolling")
              echo "Performing rolling deployment..."
              ;;
            "blue-green")
              echo "Performing blue-green deployment..."
              ;;
            "canary")
              echo "Performing canary deployment..."
              ;;
          esac

          echo "✅ Production deployment completed"

      - name: Health check production deployment
        run: |
          echo "🏥 Performing comprehensive health checks..."

          # Wait for deployment to stabilize
          sleep 60

          # Add health check logic
          # curl -f https://readysetllc.com/api/health
          # curl -f https://readysetllc.com/api/health/errors

          echo "✅ Production health checks passed"

      - name: Load testing
        run: |
          echo "🧪 Running production load tests..."

          # Add load testing logic here
          # This could use tools like:
          # - Artillery
          # - k6
          # - Apache JMeter

          echo "✅ Load testing completed successfully"

      - name: Smoke tests
        run: |
          echo "🔥 Running critical path smoke tests..."

          # Add critical path testing
          # - User registration/login
          # - Order creation
          # - Payment processing
          # - Core API endpoints

          echo "✅ Smoke tests passed"

  post-deployment:
    name: Post-deployment Tasks
    runs-on: ubuntu-latest
    needs: [deploy-production, build-production-image]
    if: always()

    steps:
      - name: Update deployment status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ Production deployment successful!"
            echo "🌐 Application URL: https://readysetllc.com"
            echo "📊 Monitoring: https://monitoring.readysetllc.com"
            echo "📝 Version: ${{ needs.build-production-image.outputs.version }}"
          else
            echo "❌ Production deployment failed!"
            echo "🚨 Initiating rollback procedures..."
          fi

      - name: Notify team
        run: |
          echo "📢 Sending deployment notifications..."
          # Add notification logic (Slack, email, etc.)
          echo "Team notified of deployment status"

      - name: Create rollback script
        if: success()
        run: |
          echo "📝 Creating rollback script for version ${{ needs.build-production-image.outputs.version }}"

          cat > rollback.sh << 'EOF'
          #!/bin/bash
          echo "🔄 Rolling back to previous version..."
          # Add rollback logic here
          echo "✅ Rollback completed"
          EOF

          chmod +x rollback.sh
          echo "Rollback script created and ready"

  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    if: ${{ failure() && inputs.rollback_version }}

    steps:
      - name: Emergency rollback
        run: |
          echo "🚨 Performing emergency rollback to ${{ inputs.rollback_version }}"

          # Add rollback deployment logic
          echo "🔄 Rollback deployment initiated..."
          echo "✅ Rollback completed successfully"
