name: release-please

# Watches `main` and proposes a release PR after each sync from
# `development`. When the release PR merges, this workflow tags the
# commit and creates a GitHub Release. See CLAUDE.md → "Versioning"
# and docs/release-please-config.json for the configuration.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
